name: Validate W3C HTML and CSS

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
      - main-beta
      - master
  push:
    branches:
      - main
      - main-beta
      - master

jobs:
  validate:
    name: Validate markup
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm install

      - name: Build Vite project
        run: npm run build

      - name: Ensure dist exists
        run: |
          if [ ! -d dist ]; then
            echo "dist folder not found after build"
            exit 1
          fi

      - name: Debug built HTML
        run: |
          if [ ! -f dist/index.html ]; then
            echo "dist/index.html not found"
            exit 1
          fi

          echo "----- dist/index.html -----"
          sed -n '1,220p' dist/index.html

      - name: Ensure partials were resolved
        shell: bash
        run: |
          set -euo pipefail

          unresolved="$(find dist -type f -name '*.html' -print0 | xargs -0 grep -n '<load ' || true)"

          if [ -n "${unresolved}" ]; then
            echo "Found unresolved <load> tags in built HTML:"
            echo "${unresolved}"
            exit 1
          fi

      - name: Download Nu Html Checker
        shell: bash
        run: |
          set -euo pipefail

          curl -L -o vnu.zip https://github.com/validator/validator/releases/latest/download/vnu.jar.zip
          unzip -q vnu.zip -d vnu

      - name: Validate HTML in dist
        shell: bash
        run: |
          set -euo pipefail

          VNU_JAR="$(find vnu -type f -name 'vnu.jar' | head -n 1)"

          if [ -z "${VNU_JAR}" ]; then
            echo "vnu.jar not found after unzip"
            find vnu -maxdepth 5 -type f | sort
            exit 1
          fi

          echo "Using validator jar: ${VNU_JAR}"

          output_file="$(mktemp)"

          set +e
          java -jar "${VNU_JAR}" \
            --errors-only \
            --skip-non-html \
            dist >"${output_file}" 2>&1
          status=$?
          set -e

          cat "${output_file}"

          if [ "${status}" -ne 0 ]; then
            echo "HTML validation failed"
            exit "${status}"
          fi

      - name: Validate CSS with W3C CSS Validator
        shell: bash
        run: |
          set -euo pipefail

          mapfile -t css_files < <(find dist -type f -name "*.css" | sort)

          if [ "${#css_files[@]}" -eq 0 ]; then
            echo "No CSS files found in dist"
            exit 1
          fi

          for css_file in "${css_files[@]}"; do
            echo "Validating CSS file: $css_file"

            response_file="$(mktemp)"

            curl -sS \
              -F "file=@${css_file}" \
              -F "output=json" \
              "https://jigsaw.w3.org/css-validator/validator" \
              -o "${response_file}"

            if [ ! -s "${response_file}" ]; then
              echo "Empty response from W3C CSS Validator"
              exit 1
            fi

            errors=$(python3 -c "import json,sys; print(int(json.load(open(sys.argv[1], encoding='utf-8')).get('cssvalidation', {}).get('result', {}).get('errorcount', 0)))" "${response_file}")
            warnings=$(python3 -c "import json,sys; print(int(json.load(open(sys.argv[1], encoding='utf-8')).get('cssvalidation', {}).get('result', {}).get('warningcount', 0)))" "${response_file}")

            echo "Errors: ${errors}; Warnings: ${warnings}"

            if [ "${errors}" -gt 0 ]; then
              echo "CSS validation failed"
              cat "${response_file}"
              exit 1
            fi

            rm -f "${response_file}"
            sleep 1
          done