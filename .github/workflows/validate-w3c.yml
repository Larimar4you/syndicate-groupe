name: Validate W3C HTML and CSS

on:
  pull_request:
    branches:
      - main
      - main-beta
      - master
  push:
    branches:
      - main
      - main-beta
      - master

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: 📦 Install dependencies
        run: npm install

      - name: 🏗 Build Vite project
        run: npm run build

      - name: 🌐 Start static server for dist
        run: |
          python3 -m http.server 4173 --directory dist &
          sleep 3

      - name: ✅ Download Nu Html Checker
        run: |
          curl -L -o vnu.zip https://github.com/validator/validator/releases/latest/download/vnu.jar.zip
          unzip -q vnu.zip -d vnu

      - name: 🔎 Validate built HTML with Nu Html Checker
        run: |
          java -jar ./vnu/dist/vnu.jar \
            --errors-only \
            --exit-zero-always \
            http://127.0.0.1:4173/index.html | tee vnu-output.txt

          if grep -E "Error:|Fatal Error:" vnu-output.txt > /dev/null; then
            echo "❌ HTML validation failed"
            exit 1
          fi

      - name: 🎨 Validate built CSS with W3C CSS Validator
        shell: bash
        run: |
          set -euo pipefail

          mapfile -t css_files < <(find dist -type f -name "*.css" | sort)

          if [ ${#css_files[@]} -eq 0 ]; then
            echo "❌ No CSS files found in dist"
            exit 1
          fi

          for css_file in "${css_files[@]}"; do
            css_url="http://127.0.0.1:4173/${css_file#dist/}"
            echo "Validating CSS: $css_url"

            response="$(curl -sS --get \
              --data-urlencode "uri=$css_url" \
              --data "output=json" \
              "https://jigsaw.w3.org/css-validator/validator")"

            echo "$response" > css-result.json

            errors=$(python3 -c 'import json; print(json.load(open("css-result.json", encoding="utf-8"))["cssvalidation"]["result"]["errorcount"])')
            warnings=$(python3 -c 'import json; print(json.load(open("css-result.json", encoding="utf-8"))["cssvalidation"]["result"].get("warningcount", 0))')

            echo "Errors: $errors; Warnings: $warnings"

            if [ "$errors" -gt 0 ]; then
              echo "❌ CSS validation failed for $css_url"
              cat css-result.json
              exit 1
            fi

            sleep 1
          done