name: Validate W3C HTML and CSS

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
      - main-beta
      - master
  push:
    branches:
      - main
      - main-beta
      - master

jobs:
  validate:
    name: Validate markup
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm install

      - name: Build Vite project
        run: npm run build

      - name: Ensure dist exists
        run: |
          if [ ! -d dist ]; then
            echo "dist folder not found after build"
            exit 1
          fi

      - name: Download Nu Html Checker
        run: |
          curl -L -o vnu.zip https://github.com/validator/validator/releases/latest/download/vnu.jar.zip
          unzip -q vnu.zip -d vnu

      - name: Validate HTML in dist
        run: |
          java -jar ./vnu/dist/vnu.jar \
            --errors-only \
            --skip-non-html \
            dist | tee vnu-output.txt

          if grep -E "Error:|Fatal Error:" vnu-output.txt > /dev/null; then
            echo "HTML validation failed"
            exit 1
          fi

      - name: Validate CSS with W3C CSS Validator
        shell: bash
        run: |
          set -euo pipefail

          mapfile -t css_files < <(find dist -type f -name "*.css" | sort)

          if [ "${#css_files[@]}" -eq 0 ]; then
            echo "No CSS files found in dist"
            exit 1
          fi

          for css_file in "${css_files[@]}"; do
            echo "Validating CSS file: $css_file"

            response_file="$(mktemp)"

            curl -sS \
              -F "file=@${css_file}" \
              -F "output=json" \
              "https://jigsaw.w3.org/css-validator/validator" \
              -o "${response_file}"

            if [ ! -s "${response_file}" ]; then
              echo "Empty response from W3C CSS Validator"
              exit 1
            fi

            python3 -c '
import json, sys
path = sys.argv[1]
with open(path, "r", encoding="utf-8") as f:
    data = json.load(f)

result = data.get("cssvalidation", {}).get("result", {})
errors = int(result.get("errorcount", 0))
warnings = int(result.get("warningcount", 0))

print(f"Errors: {errors}; Warnings: {warnings}")

if errors > 0:
    print("CSS validation failed")
    sys.exit(1)
' "${response_file}"

            rm -f "${response_file}"

            sleep 1
          done