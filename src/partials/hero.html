<section class="hero">
  <div class="hero-container">
    <div class="hero-content">
      <h1 class="hero-title">
        <span data-i18n="hero.title.before">Discover the joy of learning</span>
        <span class="hero-title-accent" data-i18n="hero.title.marker">English</span>
        <span data-i18n="hero.title.after">with us!</span>
      </h1>

      <a href="#application" class="hero-button" data-i18n="hero.actions.apply">
        Leave an application
      </a>

    <a

    >
      <svg class="hero-scroll-icon" width="24" height="24" viewBox="0 0 24 24" aria-hidden="true">
        <path
          d="M12 5v12m0 0-5-5m5 5 5-5"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
