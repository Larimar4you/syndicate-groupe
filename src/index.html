<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>English Excellence</title>

    <!-- Favicon -->
    <link rel="icon" href="./assets/favicon.ico" type="image/x-icon" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap"
      as="style"
      onload="
        this.onload = null;
        this.rel = 'stylesheet';
      "
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap"
        rel="stylesheet"
      />
    </noscript>

    <!-- LCP image preload -->
    <link
      rel="preload"
      as="image"
      href="./img/hero/studing-girl-mobile.jpg"
      media="(max-width: 767px)"
    />
    <link
      rel="preload"
      as="image"
      href="./img/hero/studing-girl-tablet.jpg"
      media="(min-width: 768px) and (max-width: 1199px)"
    />
    <link
      rel="preload"
      as="image"
      href="./img/hero/studing-girl.jpg"
      media="(min-width: 1200px)"
    />

    <!-- Normalize -->
    <link rel="stylesheet" href="./css/modern-normalize.css" />

    <!-- Main styles -->
    <link rel="stylesheet" href="./css/main.css" />
  </head>

  <body>
    <load src="./partials/header.html" />
    <main>
      <load src="./partials/hero.html" />
      <load src="./partials/about.html" />
      <load src="./partials/lessons.html" />
      <load src="./partials/proposal.html" />
      <load src="./partials/teachers.html" />
      <load src="./partials/application.html" />
      <load src="./partials/reviews.html" />
    </main>
    <load src="./partials/footer.html" />

    <button id="toTopBtn" class="to-top-btn" aria-label="To top">
      <svg class="to-top-btn-icon" width="24" height="24">
        <use href="./img/sprite.svg#icon-chevron-up"></use>
      </svg>
    </button>

    <script type="module" src="./js/main.js"></script>
  </body>
</html>
